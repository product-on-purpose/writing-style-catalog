repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: validate-taxonomy
        name: Validate taxonomy entries
        entry: python tools/validate.py
        language: python
        additional_dependencies: [jsonschema, referencing, pyyaml]
        pass_filenames: false
        always_run: false
        files: ^taxonomy/

      - id: build-indexes
        name: Rebuild taxonomy.json
        entry: python tools/build-indexes.py
        language: python
        additional_dependencies: [jsonschema, referencing, pyyaml]
        pass_filenames: false
        always_run: false
        files: ^taxonomy/

      - id: no-em-dashes
        name: No em-dashes or en-dashes
        entry: "python -c \"import sys,re; [print(f'{f}: found em/en-dash') or sys.exit(1) for f in sys.argv[1:] if re.search('[\\u2013\\u2014]', open(f, encoding='utf-8').read())]\""
        language: python
        types: [markdown]

      - id: generated-docs-fresh
        name: generated docs fresh
        entry: python scripts/check_generated_fresh.py
        language: system
        pass_filenames: false
