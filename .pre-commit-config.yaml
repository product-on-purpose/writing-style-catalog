repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: validate-taxonomy
        name: Validate taxonomy entries
        entry: python tools/validate.py
        language: python
        additional_dependencies: [jsonschema, referencing, pyyaml]
        pass_filenames: false
        always_run: false
        files: ^taxonomy/

      - id: build-indexes
        name: Rebuild taxonomy.json
        entry: python tools/build-indexes.py
        language: python
        additional_dependencies: [jsonschema, referencing, pyyaml]
        pass_filenames: false
        always_run: false
        files: ^taxonomy/

      - id: no-em-dashes
        name: No em-dashes or en-dashes
        entry: "python -c \"import sys,re; [print(f'{f}: found em/en-dash') or sys.exit(1) for f in sys.argv[1:] if re.search('[\\u2013\\u2014]', open(f, encoding='utf-8').read())]\""
        language: python
        # Scope matches the CI check (scripts/check-no-dashes.mjs SCAN regex),
        # so a dash in a .py/.mjs/.yml file fails locally, not one CI round
        # trip later.
        types: [text]
        files: '\.(md|mdx|mjs|ts|astro|css|ya?ml|py)$'

      - id: validate-plugin-manifest
        name: Validate plugin manifest coherence
        # Same zero-dependency check CI runs; gives local feedback when the
        # manifests or a SKILL.md frontmatter change.
        entry: node scripts/validate-plugin-manifest.mjs
        language: system
        pass_filenames: false
        files: '^(library\.json|\.claude-plugin/|skills/|scripts/validate-plugin-manifest\.mjs)'
