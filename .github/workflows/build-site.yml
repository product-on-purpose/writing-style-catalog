name: Build and Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -r requirements-dev.txt
      - name: Validate catalog
        run: python tools/validate.py
      - uses: actions/setup-node@v5
        with: { node-version-file: .nvmrc }
      - name: Install site deps
        working-directory: site
        run: npm ci
      - name: Build site
        working-directory: site
        run: npm run build
      # Link/route integrity (SITE-STANDARD 14.11), same guards the PR build runs,
      # so the artifact that actually deploys is checked too (a direct push to main
      # or a workflow_dispatch deploy does not go through the PR build). Run from the
      # repo root against the built dist.
      - name: Check rendered link resolution + anchors (enforcing)
        env:
          STRICT_ANCHORS: '1'
        run: node scripts/check-rendered-links.mjs site/dist
      - name: Check route parity (no published route removed without a redirect)
        run: node scripts/check-route-parity.mjs site/dist
      - uses: actions/upload-pages-artifact@v5
        with: { path: ./site/dist }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
