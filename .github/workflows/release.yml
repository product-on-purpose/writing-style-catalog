name: Release

# On a v* tag push: build the plugin ZIP and publish the GitHub Release WITH the
# assets attached directly. This is the sole asset path on purpose: a Release
# created with the default GITHUB_TOKEN does not trigger a `release: published`
# event (GitHub suppresses workflow runs triggered by the default token), so a
# separate "attach on publish" workflow would never fire. Re-running is safe:
# softprops/action-gh-release overwrites same-named assets idempotently.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build release artifact
        run: |
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh "$VERSION"

      - name: Generate release notes
        run: |
          {
            cat <<'EOF'
          ## Writing Style Catalog

          Composable writing instructions on four orthogonal axes (Voice, Tone, Style, Format).

          ### Install (Claude Code)

          ```
          /plugin marketplace add product-on-purpose/agent-plugins
          /plugin install writing-style-catalog@product-on-purpose
          ```

          Update later with `/plugin update writing-style-catalog`.

          ### Claude.ai / Claude Desktop

          Download the ZIP below, extract it, and point your client at
          `.claude-plugin/plugin.json`. The archive root holds the plugin manifests,
          every skill (currently `writing-instruction-builder`, `style-profile`,
          `entry-recommender`), and the `taxonomy/` catalog they read.

          See the full install guide in the repository for details.
          EOF
            echo ""
            echo "### What's in this release"
            echo ""
            if grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
              sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '1d;$d'
            else
              echo "See CHANGELOG.md in the repository for details."
            fi
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        # Pinned to the commit the v3 tag pointed to on 2026-07-11: a mutable
        # major tag on a third-party action holding contents:write is a supply
        # chain risk. Dependabot (.github/dependabot.yml) keeps the pin current.
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: |
            dist/writing-style-catalog-v${{ steps.version.outputs.version }}.zip
            dist/writing-style-catalog-v${{ steps.version.outputs.version }}.zip.sha256
            dist/manifest.txt
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          make_latest: true
