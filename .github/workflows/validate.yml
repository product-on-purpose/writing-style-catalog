name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install jsonschema

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Run taxonomy validation
        run: python tools/validate.py

      - name: Build indexes
        run: python tools/build-indexes.py

      - name: Check indexes are up to date
        run: git diff --exit-code taxonomy.json docs/reference/index.md

      - name: Run markdownlint
        run: markdownlint-cli2 "**/*.md" --ignore node_modules --ignore _LOCAL --ignore docs/internal
        continue-on-error: true
