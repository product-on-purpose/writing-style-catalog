name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Run taxonomy validation
        run: python tools/validate.py

      - name: Build indexes
        run: python tools/build-indexes.py

      - name: Check taxonomy.json is up to date
        run: git diff --exit-code taxonomy.json

      - name: Run markdownlint
        run: markdownlint-cli2 "**/*.md" --ignore node_modules --ignore site/node_modules --ignore _LOCAL --ignore docs/internal
        continue-on-error: true

  # PR-time non-deploying site build: closes the build gap (the deploy workflow
  # only runs on push to main). Builds the Astro site (generator + astro build)
  # without uploading or deploying, so a build-breaking change cannot merge.
  build-site:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
      - name: Install site deps
        working-directory: site
        run: npm ci
      - name: Build site (no deploy)
        working-directory: site
        run: npm run build
