name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Weekly run so link rot and toolchain drift surface between code changes
  # (the build-site job below also runs on this schedule, without deploying).
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest tests -q

      - name: Run site generator tests
        run: node --test tests/gen-site.test.mjs

      - name: Install markdownlint-cli2
        # Pinned: an unpinned global install re-resolves latest on every run,
        # so a breaking release changes CI behavior with no repo change.
        run: npm install -g markdownlint-cli2@0.23.0

      - name: Run taxonomy validation
        run: python tools/validate.py

      - name: Build indexes
        run: python tools/build-indexes.py

      - name: Check taxonomy.json is up to date
        run: git diff --exit-code taxonomy.json

      - name: Check coverage.json is up to date
        run: git diff --exit-code coverage.json

      - name: Check for em/en-dashes (house style; CI enforcement of the pre-commit hook)
        run: node scripts/check-no-dashes.mjs

      - name: Validate plugin manifest (covered by the required `validate` context)
        run: node scripts/validate-plugin-manifest.mjs

      - name: Run markdownlint
        # Scope and rule config live in .markdownlint-cli2.jsonc at repo root.
        # examples/ (generated content) and docs/internal/ are excluded there.
        run: markdownlint-cli2

  # PR-time non-deploying site build: closes the build gap (the deploy workflow
  # only runs on push to main). Builds the Astro site (generator + astro build)
  # without uploading or deploying, so a build-breaking change cannot merge.
  build-site:
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
      - name: Install site deps
        working-directory: site
        run: npm ci
      - name: Build site (no deploy)
        working-directory: site
        run: npm run build

      # Link/route integrity (SITE-STANDARD 14.11). Run from the repo root against
      # the built dist. The rendered-link check walks dist/*.html, so it covers the
      # .mdx-derived catalog pages too (it reads rendered HTML, not the source
      # pipeline). The base is derived from site/astro.config.mjs (scripts/site-base.mjs),
      # so no second base literal is introduced (14.7).
      - name: Check rendered link resolution + anchors (enforcing)
        env:
          STRICT_ANCHORS: '1'
        run: node scripts/check-rendered-links.mjs site/dist

      - name: Check route parity (no published route removed without a redirect)
        run: node scripts/check-route-parity.mjs site/dist
